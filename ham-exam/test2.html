let filtered=[]
let current=null

let seqIndex=0
let examIndex=0
let examTotal=30
let score=0


function buildSubset(){

 const level=document.getElementById("level").value

 if(level==="1"){
  filtered=questions.slice()
  return
 }

 filtered=questions.filter(q=>
   (q.id>=1 && q.id<=38) ||
   (q.id>=47 && q.id<=98) ||
   (q.id>=100 && q.id<=374) ||
   (q.id>=387 && q.id<=426)
 )

}


function nextQuestion(){

 const mode=document.getElementById("mode").value

 if(filtered.length===0) return


 if(mode==="random"){

  const i=Math.floor(Math.random()*filtered.length)
  current=filtered[i]

 }

 else if(mode==="seq"){

  if(seqIndex>=filtered.length) seqIndex=0

  current=filtered[seqIndex]
  seqIndex++

 }

 else if(mode==="exam"){

  if(examIndex>=examTotal){

   document.getElementById("question").innerText="Exam finished"
   document.getElementById("answers").innerHTML=""
   return
  }

  const i=Math.floor(Math.random()*filtered.length)
  current=filtered[i]

  examIndex++

 }

 renderQuestion()

}


function renderQuestion(){

 const q=document.getElementById("question")

 q.innerText=
  "Вопрос "+current.id+"\n\n"+current.text


 const container=document.getElementById("answers")
 container.innerHTML=""

 for(const key in current.answers){

  const btn=document.createElement("button")

  btn.innerText=key+") "+current.answers[key]

  btn.onclick=()=>checkAnswer(btn,key)

  container.appendChild(btn)

 }

 updateStats()

}


function checkAnswer(button,answer){

 const correct=current.correct

 const buttons=document.querySelectorAll("#answers button")

 buttons.forEach(btn=>btn.disabled=true)

 if(answer===correct){

  button.classList.add("correct")
  score++

 }
 else{

  button.classList.add("wrong")

  buttons.forEach(btn=>{
   if(btn.innerText.startsWith(correct+")"))
    btn.classList.add("correct")
  })

 }

 updateStats()

}


function updateStats(){

 const mode=document.getElementById("mode").value

 let txt=""

 if(mode==="exam"){
  txt="Exam "+examIndex+" / "+examTotal+" | Score: "+score
 }
 else{
  txt="Pool size: "+filtered.length+" | Score: "+score
 }

 document.getElementById("stats").innerText=txt

}


document.getElementById("startBtn").onclick=()=>{

 seqIndex=0
 examIndex=0
 score=0

 buildSubset()

 nextQuestion()

}


document.getElementById("nextBtn").onclick=nextQuestion


document.addEventListener("keydown",e=>{

 const k=e.key.toLowerCase()

 if(["a","b","c","d"].includes(k)){

  const buttons=document.querySelectorAll("#answers button")

  buttons.forEach(btn=>{
   if(btn.innerText.startsWith(k+")"))
     btn.click()
  })

 }

 if(k==="n") nextQuestion()

})
